<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SHADOW PRESIDENT :: RUN ARCHIVE</title>
<style>
@font-face{
  font-family:"Cascadia Mono";
  src:local("Cascadia Mono"),local("CascadiaMono"),
      url("https://cdn.jsdelivr.net/npm/@fontsource/cascadia-mono/files/cascadia-mono-latin-400-normal.woff2") format("woff2");
  font-weight:400;font-style:normal;font-display:swap;
}
:root{
  --bg:#010609; --bg2:#06121a; --fg:#33e9ff; --dim:#1f8294; --dimmer:#155563;
  --amber:#ffb000; --cyan:#36ffc2; --red:#ff5151; --pink:#ff5fd2; --lavender:#c0aaff;
  --line:#0c2a33; --panel:#040d11;
  --mono:"Cascadia Mono","Consolas","DejaVu Sans Mono","Courier New",monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  background:var(--bg);color:var(--fg);font-family:var(--mono);
  font-size:14px;line-height:1.6;letter-spacing:.02em;
  min-height:100vh;
}
body::before{
  content:"";position:fixed;inset:0;z-index:9999;pointer-events:none;
  background:repeating-linear-gradient(to bottom,rgba(0,0,0,0)0,rgba(0,0,0,0)2px,
    rgba(0,0,0,.22)3px,rgba(0,0,0,0)4px);
  mix-blend-mode:multiply;
}
body::after{
  content:"";position:fixed;inset:0;z-index:9998;pointer-events:none;
  background:radial-gradient(ellipse at center,rgba(0,0,0,0)55%,rgba(0,0,0,.55)100%);
}
a{color:var(--cyan);text-decoration:none}
a:hover{color:#fff;text-shadow:0 0 6px var(--cyan)}

header{
  border-bottom:1px solid var(--dim);padding:22px 32px 18px;
  background:linear-gradient(180deg,#02141a,var(--bg));
  box-shadow:0 0 24px rgba(51,233,255,.12);
}
.title{
  font-size:22px;font-weight:700;letter-spacing:.22em;
  color:var(--fg);text-shadow:0 0 10px rgba(51,233,255,.6);
}
.title .blink{animation:blink 1.05s steps(1) infinite;color:var(--amber)}
@keyframes blink{50%{opacity:0}}
.tagline{color:var(--dim);font-size:12px;letter-spacing:.14em;margin-top:5px}

main{max-width:860px;margin:0 auto;padding:36px 32px 100px}

.section-header{
  display:flex;align-items:center;gap:12px;
  color:var(--amber);font-size:12px;letter-spacing:.18em;font-weight:700;
  margin-bottom:18px;
}
.section-header::after{
  content:"";flex:1;height:1px;background:linear-gradient(to right,var(--dimmer),transparent);
}

.run-list{display:flex;flex-direction:column;gap:12px}

.run-card{
  border:1px solid var(--dimmer);background:var(--panel);
  display:grid;grid-template-columns:1fr auto;gap:12px;align-items:center;
  padding:16px 20px;
  transition:border-color .15s,box-shadow .15s;
}
.run-card:hover{
  border-color:var(--dim);
  box-shadow:0 0 16px rgba(51,233,255,.08);
}
.run-meta{display:flex;flex-direction:column;gap:5px}
.run-date{color:var(--fg);font-size:13px;letter-spacing:.06em}
.run-date .label{color:var(--dimmer);font-size:11px;letter-spacing:.14em;margin-right:8px}
.run-model{font-size:12px}
.run-model .label{color:var(--dimmer);font-size:11px;letter-spacing:.14em;margin-right:8px}
.run-model .value{color:var(--cyan)}
.run-link{
  display:inline-block;border:1px solid var(--dim);color:var(--fg);
  font-size:11px;letter-spacing:.12em;padding:7px 14px;
  white-space:nowrap;background:#02161c;
  transition:border-color .15s,background .15s;
}
.run-link:hover{
  border-color:var(--fg);background:#03252f;
  color:#fff;text-shadow:none;
}

.empty{color:var(--dimmer);font-size:13px;letter-spacing:.08em;padding:20px 0}

footer{
  border-top:1px solid var(--line);padding:18px 32px;
  color:var(--dimmer);font-size:11px;letter-spacing:.1em;
  text-align:center;
}
footer a{color:var(--dimmer)}
footer a:hover{color:var(--dim)}
</style>
</head>
<body>

<header>
  <div class="title">SHADOW PRESIDENT<span class="blink">_</span></div>
  <div class="tagline">AUTONOMOUS PLAYTHROUGH ARCHIVE &nbsp;/&nbsp; SUZERAIN SIMULATION LOG</div>
</header>

<main>
  <div class="section-header">RUN LOG INDEX</div>

  <div class="run-list">

    <!-- ENTRY FORMAT:
      date  = YYYY-MM-DD HH:MM:SS parsed from filename run_YYYYMMDD_HHMMSS_model.html
      model = human-readable model label
      href  = relative path from docs/ to the HTML file
    -->

    <div class="run-card">
      <div class="run-meta">
        <div class="run-date">
          <span class="label">DATE</span>2026-06-29 &nbsp;03:00:22
        </div>
        <div class="run-model">
          <span class="label">MODEL</span><span class="value">DeepSeek R1 Distill Qwen 14B</span>
        </div>
      </div>
      <a class="run-link" href="run_logs/run_20260629_030022_deepseek-r1-distill-qwen-14b.html">[VIEW LOG &rarr;]</a>
    </div>

    <div class="run-card">
      <div class="run-meta">
        <div class="run-date">
          <span class="label">DATE</span>2026-06-25 &nbsp;14:46:31
        </div>
        <div class="run-model">
          <span class="label">MODEL</span><span class="value">DeepSeek R1 Distill Qwen 14B</span>
        </div>
      </div>
      <a class="run-link" href="run_logs/run_20260625_144631_deepseek-r1-distill-qwen-14b.html">[VIEW LOG &rarr;]</a>
    </div>

  </div>
</main>

<footer>
  <a href="https://github.com/KawaiiFiveO/ShadowPresident" target="_blank" rel="noopener">source (GLWTS license)</a>
</footer>

</body>
</html>
